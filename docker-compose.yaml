services:
  postgis:
    image: postgis/postgis
    ports:
      - 5430:5432
    environment:
      POSTGRES_DB: cameras
      POSTGRES_PASSWORD: cameras
      POSTGRES_HOST_AUTH_METHOD: trust
    command: ["postgres", "-c", "log_statement=all", "-c", "log_destination=stderr"]
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cameras"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ./python
    volumes:
      - ./python:/app
    env_file:
      - ./python/env
    depends_on:
      postgis:
        condition: service_healthy
    command: ["prisma", "db", "push", "--schema", "/app/schema.prisma", "--accept-data-loss"]
    restart: "no"

  nextjs:
    build:
      context: ./nextjs
    volumes:
      - ./nextjs:/app
      - nextjs_node_modules:/app/node_modules
    # ports:
      # - 2999:3000
      #- 5555:5555
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgis:
        condition: service_started
    command: ["sh", "-c", "npx prisma generate && npm run dev"]

  flask:
    build:
      context: ./python
    volumes:
      - ./python:/app
    # ports:
    #   - 5000:5000
    env_file:
      - ./python/env
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "app.py", "--mode=flask"]

  # works, but is CPU bound 🐌
  # better is to figure out how to run it locally on the metal

  detector:
    build:
      context: ./python
    volumes:
      - ./python:/app
    depends_on:
      - postgis
    env_file:
      - ./python/env
    # command: ["python", "app.py", "--mode=detector"]
    # command: ["python", "app.py", "--mode=rekognition"]
    command: ["python", "app.py", "--mode=lambda"]

  certbot:
    build:
      context: ./certbot
    env_file:
      - ./.env
    volumes:
      - ./haproxy/ssl:/certs
      - certbot_etc:/etc/letsencrypt
      - certbot_lib:/var/lib/letsencrypt
      - ./certbot/entrypoint.sh:/entrypoint.sh:ro

  haproxy:
    image: haproxy:latest
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
      - ./haproxy/ssl:/usr/local/etc/haproxy/ssl:ro
    ports:
      # - 80:80
      - 14443:443
      #- 3000:3000
    depends_on:
      certbot:
        condition: service_completed_successfully
      nextjs:
        condition: service_started
      flask:
        condition: service_started
      postgrest:
        condition: service_started
      # swagger:
      #   condition: service_started

  redis:
    image: redis:latest
    # ports:
    #   - 6379:6379

  postgrest:
    image: postgrest/postgrest
    #ports:
      #- 3001:3000
    environment:
      PGRST_DB_URI: postgres://postgres:cameras@postgis/cameras
      PGRST_DB_ANON_ROLE: postgrest_ro
      PGRST_OPENAPI_SERVER_PROXY_URI: https://signals.frankhereford.com/openapi
      PGRST_LOG_LEVEL: info

      # PGRST_LOG_QUERY: main_query
    depends_on:
      - postgis

  swagger:
    image: swaggerapi/swagger-ui
    # ports:
      # - "8080:8080"
    expose:
      - "8080"
    environment:
      API_URL: https://signals.frankhereford.com/openapi
    depends_on:
      - postgrest
      - postgis

volumes:
  db_data:
  certbot_etc:
  certbot_lib:
  nextjs_node_modules:
